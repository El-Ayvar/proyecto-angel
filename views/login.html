<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <title>Login AyvarDent</title>
  <script src="../js/login.js" defer></script>
</head>
<body>
  <header></header>

  <main>
    <h2>Iniciar sesión</h2>
    <form id="loginForm">
      <input type="email" id="correo" placeholder="Correo" required><br>
      <input type="password" id="contrasena" placeholder="Contraseña" required><br>
      <button type="submit">Ingresar</button>
    </form>

    <button id="boton" style="display: none;">Continuar</button>
    <div id="mensaje"></div>
  </main>

  <footer></footer>
</body>
</html>
