<!DOCTYPE html>
<html lang="en-mx">
<head>
  <meta charset="UTF-8" />
  <title>Registro de Paciente</title>
  <script src="../js/registro.js" defer></script>
</head>
<body>
  <h2>🦷 Registro Clínico AyvarDent</h2>
  <form id="formRegistro">
    <input type="text" id="nombre" name="nombre" placeholder="Nombre completo" required /><br />
    <input type="email" id="correo" name="correo" placeholder="Correo electrónico" required /><br />
    <input type="password" id="contrasena" name="contrasena" placeholder="Contraseña" required /><br />
    <button type="submit">Registrarse</button>
  </form>

  <div id="mensaje"></div>

</body>
</html>
